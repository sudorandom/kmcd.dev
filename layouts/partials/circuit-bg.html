<div class="circuit-bg active-trigger" aria-hidden="true">
  <!-- Desktop (Vertical) Circuit -->
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 1500" class="desktop-circuit" preserveAspectRatio="none">
    <defs>
      <linearGradient id="sweep-grad" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="white" stop-opacity="0" />
        <stop offset="30%" stop-color="white" stop-opacity="1" />
        <stop offset="70%" stop-color="white" stop-opacity="1" />
        <stop offset="100%" stop-color="white" stop-opacity="0" />
      </linearGradient>
      
      <mask id="circuit-mask">
        <!-- Dynamic pulse rects spawn here -->
      </mask>
    </defs>

    <!-- Circuit paths are generated on page load. -->
    <g class="circuit-base" data-circuit-layer="desktop-base"></g>
    <!-- Glow Layer (Lights up and fades) -->
    <g class="circuit-glow" data-circuit-layer="desktop-glow" mask="url(#circuit-mask)"></g>
  </svg>

  <!-- Mobile (Horizontal) Circuit -->
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 80" class="mobile-circuit" preserveAspectRatio="none">
    <defs>
      <linearGradient id="sweep-grad-horizontal" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="white" stop-opacity="0" />
        <stop offset="30%" stop-color="white" stop-opacity="1" />
        <stop offset="70%" stop-color="white" stop-opacity="1" />
        <stop offset="100%" stop-color="white" stop-opacity="0" />
      </linearGradient>
      
      <mask id="circuit-mask-horizontal">
        <!-- Dynamic pulse rects spawn here -->
      </mask>
    </defs>

    <!-- Circuit paths are generated on page load. -->
    <g class="circuit-base" data-circuit-layer="mobile-base"></g>
    <!-- Glow Layer -->
    <g class="circuit-glow" data-circuit-layer="mobile-glow" mask="url(#circuit-mask-horizontal)"></g>
  </svg>
</div>

<script>
  const circuitSvgNS = 'http://www.w3.org/2000/svg';

  function circuitRand(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
  }

  function circuitPick(values) {
    return values[circuitRand(0, values.length - 1)];
  }

  function circuitPath(points) {
    return points.map((point, index) => `${index === 0 ? 'M' : 'L'}${point.x},${point.y}`).join(' ');
  }

  function appendCircuitShape(layer, shape) {
    const path = document.createElementNS(circuitSvgNS, 'path');
    path.setAttribute('d', shape.path);
    layer.appendChild(path);

    shape.pads.forEach((pad) => {
      const circle = document.createElementNS(circuitSvgNS, 'circle');
      circle.setAttribute('cx', pad.x);
      circle.setAttribute('cy', pad.y);
      circle.setAttribute('r', pad.outline ? '4' : '3.5');
      if (pad.outline) {
        circle.setAttribute('class', 'outline-pad');
      }
      layer.appendChild(circle);
    });
  }

  function renderCircuitLayers(baseSelector, glowSelector, shapes) {
    const base = document.querySelector(baseSelector);
    const glow = document.querySelector(glowSelector);
    if (!base || !glow) return;

    base.replaceChildren();
    glow.replaceChildren();

    shapes.forEach((shape) => {
      appendCircuitShape(base, shape);
      appendCircuitShape(glow, shape);
    });
  }

  function createDesktopCircuit() {
    const tracks = [38, 78, 118, 158, 198, 238, 262];
    const shapes = [];

    for (let i = 0; i < 7; i++) {
      const startX = circuitPick(tracks);
      let x = startX;
      let y = i < 3 ? 0 : circuitRand(260, 980);
      const points = [{ x, y }];
      const segmentCount = circuitRand(3, 5);

      for (let j = 0; j < segmentCount; j++) {
        y = Math.min(1480, y + circuitRand(130, 260));
        points.push({ x, y });

        if (j < segmentCount - 1 && Math.random() > 0.25) {
          const direction = Math.random() > 0.5 ? 1 : -1;
          x = Math.max(30, Math.min(270, x + direction * circuitPick([30, 40, 50])));
          points.push({ x, y: Math.min(1480, y + circuitPick([30, 40, 50])) });
          y = points[points.length - 1].y;
        }
      }

      shapes.push({
        path: circuitPath(points),
        pads: points.slice(1).filter(() => Math.random() > 0.35).map((point) => ({
          x: point.x,
          y: point.y,
          outline: Math.random() > 0.55,
        })),
      });
    }

    return shapes;
  }

  function createMobileCircuit() {
    const rows = [10, 20, 30, 40, 50, 60, 70];
    const shapes = [];

    for (let i = 0; i < 5; i++) {
      let x = i < 2 ? 0 : circuitRand(120, 520);
      let y = circuitPick(rows);
      const points = [{ x, y }];
      const segmentCount = circuitRand(3, 5);

      for (let j = 0; j < segmentCount; j++) {
        x = Math.min(980, x + circuitRand(120, 260));
        points.push({ x, y });

        if (j < segmentCount - 1 && Math.random() > 0.3) {
          y = circuitPick(rows.filter((row) => row !== y));
          points.push({ x: Math.min(980, x + circuitPick([20, 30, 40])), y });
          x = points[points.length - 1].x;
        }
      }

      shapes.push({
        path: circuitPath(points),
        pads: points.slice(1).filter(() => Math.random() > 0.35).map((point) => ({
          x: point.x,
          y: point.y,
          outline: Math.random() > 0.55,
        })),
      });
    }

    return shapes;
  }

  function randomizeCircuitDesign() {
    renderCircuitLayers(
      '[data-circuit-layer="desktop-base"]',
      '[data-circuit-layer="desktop-glow"]',
      createDesktopCircuit()
    );
    renderCircuitLayers(
      '[data-circuit-layer="mobile-base"]',
      '[data-circuit-layer="mobile-glow"]',
      createMobileCircuit()
    );
  }

  function spawnPulseVertical() {
    const mask = document.getElementById('circuit-mask');
    if (!mask) return;

    const rect = document.createElementNS(circuitSvgNS, 'rect');
    rect.setAttribute('class', 'circuit-pulse-vertical');
    rect.setAttribute('x', '0');
    rect.setAttribute('y', '-240');
    rect.setAttribute('width', '300');
    rect.setAttribute('height', '240');
    rect.setAttribute('fill', 'url(#sweep-grad)');

    mask.appendChild(rect);

    setTimeout(() => {
      rect.remove();
    }, 1800);
  }

  function spawnPulseHorizontal() {
    const mask = document.getElementById('circuit-mask-horizontal');
    if (!mask) return;

    const rect = document.createElementNS(circuitSvgNS, 'rect');
    rect.setAttribute('class', 'circuit-pulse-horizontal');
    rect.setAttribute('x', '-180');
    rect.setAttribute('y', '0');
    rect.setAttribute('width', '180');
    rect.setAttribute('height', '80');
    rect.setAttribute('fill', 'url(#sweep-grad-horizontal)');

    mask.appendChild(rect);

    setTimeout(() => {
      rect.remove();
    }, 1800);
  }

  function triggerCircuitAnimation(e) {
    if (e) e.preventDefault();
    const bg = document.querySelector('.circuit-bg');
    if (bg) {
      bg.classList.remove('active-trigger');
      void bg.offsetWidth; // trigger reflow
      bg.classList.add('active-trigger');
    }
    spawnPulseVertical();
    spawnPulseHorizontal();
  }

  // Trigger the page-load pulse automatically on DOM load.
  document.addEventListener('DOMContentLoaded', () => {
    randomizeCircuitDesign();
    spawnPulseVertical();
    spawnPulseHorizontal();
  });
</script>

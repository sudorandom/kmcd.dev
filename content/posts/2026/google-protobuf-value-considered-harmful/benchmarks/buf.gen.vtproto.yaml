# buf.gen.vtproto.yaml
# Used for proto/vanilla/ and proto/vtproto/.
# Generates standard Go protobuf code + vtprotobuf VT marshal/unmarshal/size methods.
# Plugins are resolved via `go tool` (see generate.sh) — no system installation needed.
version: v2
plugins:
  - local: protoc-gen-go
    out: .
    opt:
      - paths=source_relative
  - local: protoc-gen-go-vtproto
    out: .
    opt:
      - paths=source_relative
      - features=marshal+unmarshal+size
